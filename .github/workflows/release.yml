name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_suffix: Windows
          - os: macos-latest
            platform: mac
            artifact_suffix: macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact_suffix }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Electron mode — base path /)
        env:
          PORT: "1"
          BASE_PATH: "/"
          NODE_ENV: production
        run: pnpm --filter @workspace/cnc-worklist run build

      - name: Copy frontend dist into Electron folder
        shell: bash
        run: |
          mkdir -p cnc-worklist-electron/dist/frontend
          cp -r artifacts/cnc-worklist/dist/public/. cnc-worklist-electron/dist/frontend/

      - name: Install Electron dependencies
        working-directory: cnc-worklist-electron
        run: npm install

      - name: Build API bundle for Electron
        run: pnpm --filter @workspace/api-server run build:electron

      - name: Build and publish Electron app
        working-directory: cnc-worklist-electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release -- --${{ matrix.platform }}
