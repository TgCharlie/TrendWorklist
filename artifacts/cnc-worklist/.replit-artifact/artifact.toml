kind = "web"
previewPath = "/"
title = "CNC Worklist Manager"
version = "1.0.0"
id = "artifacts/cnc-worklist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20009

[services.development]
run = "pnpm --filter @workspace/cnc-worklist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cnc-worklist", "run", "build" ]
publicDir = "artifacts/cnc-worklist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20009"
BASE_PATH = "/"
