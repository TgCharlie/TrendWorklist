appId: com.cncworklistmanager.app
productName: CNC Worklist Manager
copyright: Copyright © 2024 Your Company Name

directories:
  buildResources: build
  output: dist

files:
  - main.js
  - preload.js
  - package.json
  - node_modules/**/*

# Icon files (optional but recommended):
#   build/icon.ico      — Windows (256×256 ICO)
#   build/icon.icns     — macOS (512×512 ICNS)
#   build/tray-icon.png — Windows system tray (16×16 or 32×32 PNG)
# If absent, electron-builder falls back to the default Electron icon.

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CNC Worklist Manager

msi:
  oneClick: false
  perMachine: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: "CNC Worklist Manager"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# owner/repo are auto-detected from the git remote and the GITHUB_REPOSITORY
# environment variable (set automatically by GitHub Actions).
publish:
  provider: github
  releaseType: release

autoUpdatable: true
