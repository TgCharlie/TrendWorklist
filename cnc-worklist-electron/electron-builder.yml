appId: com.cncworklistmanager.app
productName: CNC Worklist Manager
copyright: Copyright © 2024 Trendgosa

directories:
  buildResources: build
  output: dist

# Files packed into app.asar (JS only — no native binaries, no static assets)
files:
  - main.js
  - preload.js
  - package.json
  - api/**
  - node_modules/**

# Native modules must live outside the asar so Node can load the .node binary
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/bindings/**"
  - "node_modules/file-uri-to-path/**"
  - "**/*.node"

# Resources placed outside the asar at process.resourcesPath
# Frontend static files must be outside asar so Express can serve them
extraResources:
  - from: dist/frontend/
    to: frontend/
  - from: build/
    to: build/
    filter:
      - "*.png"
      - "*.ico"
      - "*.icns"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
  # Place build/icon.ico (256×256) here when you have a real icon.
  # electron-builder uses a default Electron icon if the file is absent.

msi:
  createDesktopShortcut: false
  createStartMenuShortcut: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CNC Worklist Manager

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  # Place build/icon.icns here when you have a real icon.

dmg:
  title: "CNC Worklist Manager"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
