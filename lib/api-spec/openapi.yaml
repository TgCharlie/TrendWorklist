openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CNC Worklist Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management (admin only)
  - name: projects
    description: FileMaker Projects
  - name: cutlists
    description: FileMaker Cutlists
  - name: stockbook
    description: FileMaker StockBook
  - name: materials
    description: Internal materials database
  - name: worklists
    description: Worklist management
  - name: folders
    description: Folder sequence management
  - name: settings
    description: Application settings (admin only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects from FileMaker
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project from FileMaker
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cutlists:
    get:
      operationId: listCutlists
      tags: [cutlists]
      summary: List cutlists from FileMaker for a given project
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of cutlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cutlist"

  /cutlists/{cutlistId}:
    get:
      operationId: getCutlist
      tags: [cutlists]
      summary: Get a single cutlist from FileMaker
      parameters:
        - name: cutlistId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cutlist details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cutlist"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stockbook/otypes:
    get:
      operationId: listStockbookOtypes
      tags: [stockbook]
      summary: List distinct OTYPE values in the local stockbook
      responses:
        "200":
          description: List of OTYPEs
          content:
            application/json:
              schema:
                type: object
                properties:
                  otypes:
                    type: array
                    items:
                      type: string
                required:
                  - otypes

  /stockbook:
    get:
      operationId: listStockbook
      tags: [stockbook]
      summary: List stockbook items from local database
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: otype
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Stockbook list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockbookList"

  /stockbook/{pcode}/tracked:
    patch:
      operationId: updateStockTracked
      tags: [stockbook]
      summary: Update Tag_StockTracked flag in FileMaker StockBook for a PCODE
      parameters:
        - name: pcode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStockTrackedBody"
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockTrackedResult"
        "404":
          description: PCODE not found in FileMaker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: FileMaker error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stockbook/{pcode}:
    get:
      operationId: getStockLevel
      tags: [stockbook]
      summary: Get stock level for a PCODE from FileMaker
      parameters:
        - name: pcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock level info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockLevel"
        "404":
          description: PCODE not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List internal materials
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: favouritesOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [materials]
      summary: Create a new material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialBody"
      responses:
        "201":
          description: Material created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /materials/{id}:
    get:
      operationId: getMaterial
      tags: [materials]
      summary: Get a material by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMaterial
      tags: [materials]
      summary: Update a material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaterialBody"
      responses:
        "200":
          description: Material updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMaterial
      tags: [materials]
      summary: Delete a material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /materials/{id}/favourite:
    post:
      operationId: toggleFavourite
      tags: [materials]
      summary: Toggle favourite status for a material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favourite toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToggleFavouriteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /materials/{id}/stock:
    get:
      operationId: getMaterialStock
      tags: [materials]
      summary: Get live stock level for a material via its PCODE
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stock level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockLevel"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /worklists:
    get:
      operationId: listWorklists
      tags: [worklists]
      summary: List all worklists
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, submitted, completed]
      responses:
        "200":
          description: List of worklists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorklistSummary"
    post:
      operationId: createWorklist
      tags: [worklists]
      summary: Create a new worklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorklistBody"
      responses:
        "201":
          description: Worklist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worklist"

  /worklists/stats:
    get:
      operationId: getWorklistStats
      tags: [worklists]
      summary: Get worklist summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorklistStats"

  /worklists/{id}:
    get:
      operationId: getWorklist
      tags: [worklists]
      summary: Get a worklist by ID (includes items)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Worklist with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worklist"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateWorklist
      tags: [worklists]
      summary: Update a worklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorklistBody"
      responses:
        "200":
          description: Updated worklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worklist"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteWorklist
      tags: [worklists]
      summary: Delete a worklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /worklists/{id}/items:
    post:
      operationId: addWorklistItem
      tags: [worklists]
      summary: Add an item to a worklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorklistItemBody"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorklistItem"

  /worklists/{id}/items/{itemId}:
    put:
      operationId: updateWorklistItem
      tags: [worklists]
      summary: Update a worklist item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorklistItemBody"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorklistItem"
    delete:
      operationId: deleteWorklistItem
      tags: [worklists]
      summary: Remove an item from a worklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /worklists/{id}/csv:
    get:
      operationId: downloadWorklistCsv
      tags: [worklists]
      summary: Download worklist as CSV
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /folders/next:
    get:
      operationId: getNextFolder
      tags: [folders]
      summary: Get next sequential folder reference for a machine type
      parameters:
        - name: machine
          in: query
          required: true
          schema:
            type: string
            enum: [B, C]
      responses:
        "200":
          description: Next folder reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderRef"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings (admin only)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginBody:
      type: object
      properties:
        username:
          type: string
        pin:
          type: string
      required:
        - username
        - pin

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, operator]
      required:
        - id
        - username
        - role

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, operator]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - role
        - active
        - createdAt

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        pin:
          type: string
        role:
          type: string
          enum: [admin, operator]
      required:
        - username
        - pin
        - role

    UpdateUserBody:
      type: object
      properties:
        pin:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, operator]
        active:
          type: boolean

    Project:
      type: object
      description: Project record from FileMaker (may include additional FileMaker field data)
      properties:
        id:
          type: string
          description: FileMaker ProjectID value
        recordId:
          type: string
          description: FileMaker internal record ID
        address:
          type: ["string", "null"]
        clientName:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
      required:
        - id
      additionalProperties: true

    Cutlist:
      type: object
      description: Cutlist record from FileMaker (may include additional FileMaker field data)
      properties:
        id:
          type: string
          description: FileMaker CutlistID value
        recordId:
          type: string
          description: FileMaker internal record ID
        projectId:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
      required:
        - id
      additionalProperties: true

    StockLevel:
      type: object
      description: Stock level record from FileMaker StockBook (may include additional field data)
      properties:
        pcode:
          type: string
        description:
          type: string
        qtyOnHand:
          type: ["number", "null"]
        unit:
          type: ["string", "null"]
      required:
        - pcode
        - description
      additionalProperties: true

    StockbookItem:
      type: object
      properties:
        id:
          type: integer
        pcode:
          type: string
        description:
          type: string
        qtyOnHand:
          type: number
        unit:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        otype:
          type: ["string", "null"]
        project:
          type: ["string", "null"]
        pid:
          type: ["string", "null"]
        lastSyncedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - pcode
        - description
        - qtyOnHand

    StockbookList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StockbookItem"
        lastSyncedAt:
          type: ["string", "null"]
          format: date-time
        total:
          type: integer
      required:
        - items
        - total

    UpdateStockTrackedBody:
      type: object
      properties:
        tracked:
          type: boolean
      required:
        - tracked

    StockTrackedResult:
      type: object
      properties:
        pcode:
          type: string
        tracked:
          type: boolean
      required:
        - pcode
        - tracked

    ToggleFavouriteResult:
      type: object
      properties:
        isFavourite:
          type: boolean
        materialId:
          type: integer
      required:
        - isFavourite
        - materialId

    Material:
      type: object
      properties:
        id:
          type: integer
        pcode:
          type: string
        displayName:
          type: string
        notes:
          type: ["string", "null"]
        isFavourite:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - pcode
        - displayName
        - createdAt

    CreateMaterialBody:
      type: object
      properties:
        pcode:
          type: string
        displayName:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - pcode
        - displayName

    UpdateMaterialBody:
      type: object
      properties:
        pcode:
          type: string
        displayName:
          type: string
        notes:
          type: ["string", "null"]

    WorklistSummary:
      type: object
      description: Summary view of a worklist (returned by list endpoint)
      properties:
        id:
          type: integer
        worklistNumber:
          type: string
        projectId:
          type: ["string", "null"]
        projectAddress:
          type: ["string", "null"]
        machineType:
          type: string
          enum: [B, C]
        folderNumber:
          type: integer
        status:
          type: string
          enum: [draft, submitted, completed]
        createdBy:
          type: ["integer", "null"]
          description: ID of the user who created the worklist
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - worklistNumber
        - machineType
        - folderNumber
        - status
        - createdAt

    Worklist:
      type: object
      description: Full worklist with items (returned by GET /worklists/:id)
      properties:
        id:
          type: integer
        worklistNumber:
          type: string
        projectId:
          type: ["string", "null"]
        projectAddress:
          type: ["string", "null"]
        cutlistRefs:
          type: array
          items:
            type: string
        machineType:
          type: string
          enum: [B, C]
        folderNumber:
          type: integer
        status:
          type: string
          enum: [draft, submitted, completed]
        createdBy:
          type: ["integer", "null"]
          description: ID of the user who created the worklist
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorklistItem"
      required:
        - id
        - worklistNumber
        - machineType
        - folderNumber
        - status
        - createdAt
        - items

    CreateWorklistBody:
      type: object
      properties:
        projectId:
          type: string
        projectAddress:
          type: string
        cutlistRefs:
          type: array
          items:
            type: string
        machineType:
          type: string
          enum: [B, C]
      required:
        - machineType

    UpdateWorklistBody:
      type: object
      properties:
        status:
          type: string
          enum: [draft, submitted, completed]
        cutlistRefs:
          type: array
          items:
            type: string

    WorklistItem:
      type: object
      properties:
        id:
          type: integer
        worklistId:
          type: integer
        materialId:
          type: ["integer", "null"]
        pcode:
          type: string
